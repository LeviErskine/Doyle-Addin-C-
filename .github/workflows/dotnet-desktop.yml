name: DoyleAddin - Build & Release on PR Merge to Master

on:
  pull_request:
    types: [closed]
    branches:
      - master

jobs:
  build-and-release:
    if: github.event.pull_request.merged == true
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository (master branch after merge)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj', '**/*.sln') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Determine next semantic version (major / minor / patch from PR labels)
        id: version
        shell: pwsh
        run: |
          # Read labels from the merged PR (case-insensitive)
          $labelsJson = '${{ toJson(github.event.pull_request.labels.*.name) }}'
          $labels = @()
          if ($labelsJson -ne 'null' -and $labelsJson -ne '') {
            $labels = $labelsJson | ConvertFrom-Json
          }
          $labelsLower = $labels | ForEach-Object { $_.ToLower() }

          $bumpType = "patch"
          if ($labelsLower -contains "major")      { $bumpType = "major" }
          elseif ($labelsLower -contains "minor")  { $bumpType = "minor" }
          elseif ($labelsLower -contains "patch")  { $bumpType = "patch" }

          Write-Host "PR labels: $($labels -join ', ')"
          Write-Host "Bump type selected: $bumpType"

          # Get latest tag
          $lastTag = (git tag --sort=-version:refname | Select-Object -First 1)
          if (-not $lastTag) {
            $lastTag = "7.0.12.0"
            Write-Host "No tags found - starting from 7.0.12.0"
          } else {
            Write-Host "Latest tag: $lastTag"
          }

          # Support 4-part versioning (e.g. 7.0.12.0)
          if ($lastTag -match '^v?(\d+)\.(\d+)\.(\d+)(?:\.(\d+))?') {
            $major = [int]$matches[1]
            $minor = [int]$matches[2]
            $patch = [int]$matches[3]
            $build = if ($matches[4]) { [int]$matches[4] } else { 0 }

            switch ($bumpType) {
              "major" { $major++; $minor = 0; $patch = 0; $build = 0; break }
              "minor" { $minor++; $patch = 0; $build = 0; break }
              "patch" { $patch++; $build = 0; break }
            }
            $newVersion = "$major.$minor.$patch.$build"
          } else {
            $newVersion = "7.0.13.0"
          }

          Write-Host "New version will be: $newVersion"
          echo "version=$newVersion" >> $env:GITHUB_OUTPUT
          echo "bump_type=$bumpType" >> $env:GITHUB_OUTPUT

      - name: Publish DoyleAddin (Release)
        run: |
          dotnet publish DoyleAddin.sln -c Release `
            -o ./publish/DoyleAddin `
            /p:FileVersion=${{ steps.version.outputs.version }} `
            /p:AssemblyVersion=${{ steps.version.outputs.version }} `
            /p:AppendTargetFrameworkToOutputPath=false `
            /p:AppendRuntimeIdentifierToOutputPath=false

      - name: Debug - Show published files
        shell: pwsh
        run: |
          Write-Host "=== Contents of ./publish ==="
          Get-ChildItem -Path ./publish -Recurse | Select-Object FullName, Length | Format-Table -AutoSize
          Write-Host "=== End of listing ==="

      - name: Zip the published add-in into DoyleAddin.zip
        shell: pwsh
        run: |
          $publishPath = "./publish/DoyleAddin"
          if (-not (Test-Path $publishPath)) {
            Write-Error "Publish output not found at $publishPath"
            exit 1
          }
          Compress-Archive -Path "$publishPath/*" -DestinationPath "DoyleAddin.zip" -Force
          Write-Host "Created DoyleAddin.zip (ready for C:\ProgramData\Autodesk\Inventor Addins\DoyleAddin)"

      - name: Create GitHub Release with attached binaries
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          body: |
            Automated release from merged PR #${{ github.event.pull_request.number }}
            ${{ github.event.pull_request.html_url }}

            **Bump type:** ${{ steps.version.outputs.bump_type }}
            **Version:** v${{ steps.version.outputs.version }}
          files: |
            DoyleAddin.zip
            Updater.bat
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

# How to control the version bump (case-insensitive):
#   Add one of these labels to the PR before merging:
#     • major   → bumps major (e.g. 7.0.12.0 → 8.0.0.0)
#     • minor   → bumps minor (e.g. 7.0.12.0 → 7.1.0.0)
#     • patch   → bumps patch (e.g. 7.0.12.0 → 7.0.13.0)
